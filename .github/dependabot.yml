version: 2
updates:
  # Backend npm dependencies
  - package-ecosystem: "npm"
    directory: "/backend"
    target-branch: "develop"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Asia/Bangkok"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      # Group all minor and patch updates together
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Group TypeScript-related packages
      typescript:
        patterns:
          - "@typescript-eslint/*"
          - "typescript"
          - "@types/*"
      # Group testing packages
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"

  # Frontend npm dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    target-branch: "develop"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Asia/Bangkok"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      # Group all minor and patch updates together
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Group TypeScript-related packages
      typescript:
        patterns:
          - "@typescript-eslint/*"
          - "typescript"
          - "typescript-eslint"
          - "@types/*"
      # Group React packages
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      # Group testing packages
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "jsdom"
      # Group ESLint packages
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    target-branch: "develop"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Asia/Bangkok"
    groups:
      actions:
        patterns:
          - "*"